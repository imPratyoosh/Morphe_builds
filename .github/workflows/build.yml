name: Build APKs
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Select build mode'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - dev
      patch_source:
        description: 'Select patch source'
        required: true
        default: 'morphe'
        type: choice
        options:
          - morphe
          - piko
          - rookie-enough
          - hoo-dles
          - ample-revanced
  workflow_call:
    inputs:
      build_mode:
        default: 'stable'
        type: string
      patch_source:
        default: 'morphe'
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      tag: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Set matrix based on patch source
        id: set-matrix
        run: |
          matrix="$(uv run main.py get-matrix "${{ inputs.patch_source }}")"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

      - name: Prepare version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(date +%y.%m.%d)"
          [[ "${{ inputs.build_mode }}" == "dev" ]] && VER="${VER}-pre"
          VER="${VER}-${{ inputs.patch_source }}"
          if gh release view "$VER" >/dev/null 2>&1; then
            VER="${VER/$(date +%y.%m.%d)/$(date +%y.%m.%d-%H.%M)}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.version }}
        run: gh release create "$TAG" --draft --title "$TAG"

  run:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Install java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build APKs
        run: uv run main.py ${{ matrix.id }} ${{ matrix.arch }}
        env:
          BUILD_MODE: ${{ inputs.build_mode }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}

      - name: Upload APKs to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          shopt -s nullglob; apks=(./build/*.apk)
          [[ ${#apks[@]} -gt 0 ]] && gh release upload "$TAG" "${apks[@]}" --clobber || true

      - name: Upload build log to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          LOG_NAME: log-${{ inputs.patch_source }}-${{ matrix.id }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}.md
        run: |
          if [ -f build.md ]; then
            cp build.md "$LOG_NAME"
            gh release upload "$TAG" "$LOG_NAME" --clobber || true
          fi

  release:
    needs: [prepare, run]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Check and download logs
        id: check_artifacts
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          mkdir -p logs
          gh release download "$TAG" --pattern 'log-${{ inputs.patch_source }}-*.md' --dir logs
          
          shopt -s nullglob
          logs=(logs/*.md)
          if [ ${#logs[@]} -gt 0 ]; then
            for f in "${logs[@]}"; do
              dir_name="logs/$(basename "$f" .md)"
              mkdir -p "$dir_name"
              mv "$f" "$dir_name/build.md"
            done
            echo "has_artifacts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_artifacts=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Combine logs
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        id: get_output
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          DELIM="$(openssl rand -hex 8)"
          echo "BUILD_LOG<<${DELIM}" >> "$GITHUB_OUTPUT"
          uv run main.py combine-logs logs | sed "s/{TAG}/$TAG/g" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Upload release
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          BODY: ${{ steps.get_output.outputs.BUILD_LOG }}
          IS_PRERELEASE: ${{ inputs.build_mode == 'dev' }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" == "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release edit "$TAG" --draft=false --notes "$BODY" $PRERELEASE_FLAG

      - name: Cleanup log assets from release
        if: steps.check_artifacts.outputs.has_artifacts == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          assets=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name | startswith("log-")) | .name')
          for asset in $assets; do
            gh release delete-asset "$TAG" "$asset" -y
          done